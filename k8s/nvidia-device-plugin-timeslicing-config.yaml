apiVersion: v1
kind: Namespace
metadata:
  name: nvidia-device-plugin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nvidia-device-plugin-config
  namespace: nvidia-device-plugin
data:
  # NVIDIA k8s-device-plugin Helm chart에서 읽을 time-slicing 설정 파일입니다.
  #
  # 이 파일만 apply한다고 time-slicing이 바로 적용되는 것은 아닙니다.
  # device-plugin을 Helm으로 설치/업그레이드할 때 config.name과 config.default로 이 ConfigMap을 지정해야 합니다.
  #
  # time-slicing의 의미:
  # - Kubernetes 스케줄러에는 물리 GPU 1장을 여러 개의 nvidia.com/gpu 슬롯처럼 보이게 합니다.
  # - replicas: 2이면 GPU 1장이 스케줄링 관점에서 2개 슬롯처럼 노출됩니다.
  # - 실제 VRAM을 6GB/6GB처럼 물리적으로 나누는 기능은 아닙니다.
  # - vLLM Pod 두 개를 동시에 띄우면 모델 메모리와 KV cache가 같은 GPU VRAM을 공유하므로 OOM이 날 수 있습니다.
  time-slicing-config.yaml: |
    version: v1
    sharing:
      timeSlicing:
        renameByDefault: false
        failRequestsGreaterThanOne: true
        resources:
          - name: nvidia.com/gpu
            replicas: 2
