apiVersion: v1
kind: ConfigMap
metadata:
  name: nvidia-device-plugin-config
  namespace: kube-system
data:
  # 이 ConfigMap은 NVIDIA k8s-device-plugin이 읽을 time-slicing 설정 예시입니다.
  #
  # time-slicing이 하는 일:
  # - Kubernetes 스케줄러가 하나의 물리 GPU를 여러 개의 GPU 슬롯처럼 보게 만듭니다.
  # - 예를 들어 replicas: 2이면 GPU 1장을 논리적으로 2개 워크로드에 배정할 수 있게 됩니다.
  # - 각 워크로드는 시간을 나누어 같은 GPU에서 실행됩니다.
  #
  # time-slicing이 하지 않는 일:
  # - GPU 메모리(VRAM)를 물리적으로 나누지 않습니다.
  # - 각 Pod에 독립적인 6GB/6GB 같은 메모리 파티션을 보장하지 않습니다.
  # - 모델이 너무 크거나 여러 Pod의 KV cache가 커지면 OOM이 발생할 수 있습니다.
  #
  # 이 PoC에서의 의미:
  # - 로컬 RTX 4070 Ti 단일 Docker 테스트에는 직접 적용하지 않습니다.
  # - 향후 Linux/Kubernetes GPU 노드에서 여러 vLLM Pod를 동시에 테스트할 때 사용할 초안입니다.
  time-slicing-config.yaml: |
    version: v1
    sharing:
      timeSlicing:
        # false이면 리소스 이름을 nvidia.com/gpu 그대로 유지합니다.
        # true로 두면 공유 GPU임을 나타내는 다른 이름으로 노출될 수 있어 클러스터 운영 정책에 맞춰야 합니다.
        renameByDefault: false
        # true이면 Pod가 nvidia.com/gpu: 2처럼 2개 이상 요청하는 것을 막습니다.
        # time-slicing은 "한 Pod에 더 많은 GPU 성능을 주는 기능"이 아니므로 초안에서는 true로 둡니다.
        failRequestsGreaterThanOne: true
        resources:
          - name: nvidia.com/gpu
            # 물리 GPU 1개를 Kubernetes 스케줄러에는 2개의 슬롯처럼 보이게 합니다.
            # RTX 4070 Ti 12GB 기준으로는 vLLM 두 개를 안정적으로 보장한다는 뜻이 아니며,
            # 실제 동시 실행 가능 여부는 모델 크기, max_model_len, 프레임 수, KV cache에 따라 달라집니다.
            replicas: 2
