apiVersion: v1
kind: Namespace
metadata:
  name: vlm-poc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen3-vl-2b
  namespace: vlm-poc
  labels:
    app: vllm-qwen3-vl-2b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-qwen3-vl-2b
  template:
    metadata:
      labels:
        app: vllm-qwen3-vl-2b
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            # vLLM OpenAI 호환 서버에 Qwen VLM 모델을 로드합니다.
            - --model
            - Qwen/Qwen3-VL-2B-Instruct
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            # RTX 4070 Ti급 12GB 환경에서는 OOM이 나면 0.80 또는 0.75로 낮춰 테스트합니다.
            - --gpu-memory-utilization
            - "0.85"
            # 영상 프레임 여러 장을 넣으면 이미지 토큰이 늘어나므로 OOM이 나면 4096으로 낮춰 테스트합니다.
            - --max-model-len
            - "8192"
            - --trust-remote-code
          ports:
            - name: http
              containerPort: 8000
          resources:
            limits:
              # time-slicing이 적용된 클러스터에서는 이 요청 1개가 공유 슬롯 1개를 의미합니다.
              # 실제 GPU 메모리는 공유되므로 안정적인 동시 실행을 보장하지 않습니다.
              nvidia.com/gpu: 1
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: hf-cache
          # PoC 초안에서는 emptyDir를 사용합니다.
          # 반복 테스트나 운영에 가까운 환경에서는 PVC로 바꿔 모델 다운로드 시간을 줄이는 것이 좋습니다.
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-qwen3-vl-2b
  namespace: vlm-poc
  labels:
    app: vllm-qwen3-vl-2b
spec:
  type: ClusterIP
  selector:
    app: vllm-qwen3-vl-2b
  ports:
    - name: http
      port: 8000
      targetPort: http
